<!DOCTYPE html>
<html lang="en">
<head>
  <script>
  // Apply theme before paint to avoid flash. Order: manual pref > time-of-day > light.
  (function(){
    try {
      var t = localStorage.getItem('junximu-theme');
      if (t === 'dark' || t === 'light') {
        if (t === 'dark') document.documentElement.setAttribute('data-theme','dark');
      } else {
        // auto: 06:00–17:59 light, otherwise dark
        var h = new Date().getHours();
        if (h < 6 || h >= 18) document.documentElement.setAttribute('data-theme','dark');
      }
    } catch(e) {}
  })();
  </script>
